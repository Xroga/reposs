<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>XROGA Build</title>
<style>/* ===== RESET & VARIABLES ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f5f0;
  --surface: #ffffff;
  --surface-hover: #f0eee8;
  --sidebar-bg: #ecebe4;
  --text: #1c1b1a;
  --text-secondary: #6b6a66;
  --border: #d4d2cb;
  --accent: #4f46e5;
  --accent-hover: #433cc9;
  --bubble-user: #4f46e5;
  --bubble-user-text: #ffffff;
  --bubble-ai: #e8e6df;
  --bubble-ai-text: #1c1b1a;
  --shadow: 0 1px 3px rgba(0,0,0,0.06);
  --radius: 12px;
  --radius-sm: 8px;
  --transition: 0.2s ease;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --max-width: 720px;
}

[data-theme="dark"] {
  --bg: #11100e;
  --surface: #1a1917;
  --surface-hover: #242220;
  --sidebar-bg: #161513;
  --text: #e8e6df;
  --text-secondary: #9b9a95;
  --border: #2c2a28;
  --accent: #818cf8;
  --accent-hover: #94a0ff;
  --bubble-user: #818cf8;
  --bubble-user-text: #11100e;
  --bubble-ai: #242220;
  --bubble-ai-text: #e8e6df;
  --shadow: 0 1px 3px rgba(0,0,0,0.3);
}

html, body {
  height: 100%;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

.hidden { display: none !important; }

/* ===== LAYOUT ===== */
#app {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ===== SIDEBAR ===== */
#sidebar {
  width: 260px;
  min-width: 260px;
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  transition: transform var(--transition), opacity var(--transition);
}

.sidebar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 14px;
  border-bottom: 1px solid var(--border);
}

.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 700;
  font-size: 16px;
}

#history-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.history-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 14px;
  color: var(--text-secondary);
  transition: background var(--transition);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.history-item:hover {
  background: var(--surface-hover);
  color: var(--text);
}

.history-item.active {
  background: var(--surface);
  color: var(--text);
  font-weight: 500;
}

.history-item i {
  flex-shrink: 0;
}

.sidebar-footer {
  display: flex;
  gap: 4px;
  padding: 12px 14px;
  border-top: 1px solid var(--border);
  justify-content: flex-end;
}

/* ===== MAIN ===== */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--surface);
  max-width: var(--max-width);
  margin: 0 auto;
  width: 100%;
  position: relative;
}

/* ===== HEADER ===== */
#chat-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.header-info h1 {
  font-size: 16px;
  font-weight: 600;
}

.header-status {
  font-size: 12px;
  color: var(--text-secondary);
}

#menu-toggle { display: none; }

/* ===== MESSAGES ===== */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
}

.message {
  display: flex;
  gap: 10px;
  max-width: 80%;
  animation: fadeIn 0.25s ease;
}

.message.user {
  align-self: flex-end;
  flex-direction: row-reverse;
}

.message.ai {
  align-self: flex-start;
}

.message-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}

.message.user .message-avatar {
  background: var(--bubble-user);
  color: var(--bubble-user-text);
}

.message.ai .message-avatar {
  background: var(--bubble-ai);
  color: var(--bubble-ai-text);
}

.message-bubble {
  padding: 10px 14px;
  border-radius: var(--radius);
  font-size: 14px;
  line-height: 1.5;
  word-break: break-word;
}

.message.user .message-bubble {
  background: var(--bubble-user);
  color: var(--bubble-user-text);
  border-bottom-right-radius: 4px;
}

.message.ai .message-bubble {
  background: var(--bubble-ai);
  color: var(--bubble-ai-text);
  border-bottom-left-radius: 4px;
}

.message-time {
  font-size: 10px;
  color: var(--text-secondary);
  margin-top: 4px;
  text-align: right;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== TYPING INDICATOR ===== */
#typing-indicator {
  display: flex;
  gap: 4px;
  padding: 8px 20px 4px 20px;
  align-items: center;
}

#typing-indicator.hidden { display: none; }

.typing-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--text-secondary);
  animation: typingPulse 1.2s infinite;
}

.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes typingPulse {
  0%, 60%, 100% { opacity: 0.3; transform: scale(0.9); }
  30% { opacity: 1; transform: scale(1.1); }
}

/* ===== CHAT FORM ===== */
#chat-form {
  display: flex;
  gap: 10px;
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--surface);
}

#chat-input {
  flex: 1;
  padding: 10px 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  outline: none;
  transition: border var(--transition);
}

#chat-input:focus {
  border-color: var(--accent);
}

#chat-input::placeholder { color: var(--text-secondary); }

/* ===== BUTTONS ===== */
.icon-btn {
  background: none;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  padding: 6px;
  border-radius: var(--radius-sm);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: background var(--transition), color var(--transition);
}

.icon-btn:hover {
  background: var(--surface-hover);
  color: var(--text);
}

.primary-btn {
  background: var(--accent);
  color: white;
  border: none;
  padding: 10px 16px;
  border-radius: var(--radius);
  cursor: pointer;
  font-family: var(--font);
  font-weight: 500;
  font-size: 14px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: background var(--transition);
}

.primary-btn:hover {
  background: var(--accent-hover);
}

#send-btn {
  border-radius: 50%;
  width: 40px;
  height: 40px;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  animation: fadeIn 0.2s ease;
}

.modal {
  background: var(--surface);
  border-radius: var(--radius);
  width: 90%;
  max-width: 420px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  overflow: hidden;
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 20px;
  border-bottom: 1px solid var(--border);
}

.modal-header h2 { font-size: 16px; font-weight: 600; }

.modal-body {
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.setting-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 14px;
}

.setting-row select,
.setting-row input[type="text"] {
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  outline: none;
}

.setting-row select:focus,
.setting-row input[type="text"]:focus {
  border-color: var(--accent);
}

.modal-footer {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  #sidebar {
    position: absolute;
    z-index: 50;
    height: 100%;
    transform: translateX(-100%);
    opacity: 0;
    width: 280px;
    min-width: 280px;
  }

  #sidebar.open {
    transform: translateX(0);
    opacity: 1;
  }

  #menu-toggle { display: flex; }

  #main {
    max-width: 100%;
  }

  .message {
    max-width: 90%;
  }

  #chat-form {
    padding: 12px 14px;
  }

  #messages {
    padding: 14px;
  }
}</style>
</head>

    </div>

    <!-- settings modal -->
    <div id="settings-modal" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h2>Settings</h2>
                <button id="close-settings" class="icon-btn">
                    <i data-lucide="x" style="width:18px;height:18px"></i>
                </button>
            </div>
            <div class="modal-body">
                <label class="setting-row">
                    <span>Theme</span>
                    <select id="settings-theme">
                        <option value="light">Light</option>
                        <option value="dark">Dark</option>
                    </select>
                </label>
                <label class="setting-row">
                    <span>Response speed</span>
                    <select id="settings-speed">
                        <option value="fast">Fast</option>
                        <option value="normal" selected>Normal</option>

                </label>
            </div>
            <div class="modal-footer">
                <button id="save-settings" class="primary-btn">Save</button>
            </div>
        </div>
    </div>

    var url = 'https://api.coingecko.com/api/v3/simple/price?ids=' + encodeURIComponent(list)
      + '&vs_currencies=usd&include_24hr_change=true';

// ===== STATE =====
const STATE = {
  chats: JSON.parse(localStorage.getItem('flowchat_chats') || '[]'),
  activeChatId: localStorage.getItem('flowchat_active') || null,
  theme: localStorage.getItem('flowchat_theme') || 'light',
  aiName: localStorage.getItem('flowchat_ai_name') || 'Assistant',
  speed: localStorage.getItem('flowchat_speed') || 'normal',
  typing: false,
};

// ===== DOM REFS =====
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

const messagesEl = $('#messages');
const chatForm = $('#chat-form');
const chatInput = $('#chat-input');
const typingIndicator = $('#typing-indicator');
const historyList = $('#history-list');
const newChatBtn = $('#new-chat-btn');
const themeToggle = $('#theme-toggle');
const clearHistoryBtn = $('#clear-history-btn');
const menuToggle = $('#menu-toggle');
const sidebar = $('#sidebar');
const settingsBtn = $('#settings-btn');
const settingsModal = $('#settings-modal');
const closeSettings = $('#close-settings');
const saveSettings = $('#save-settings');
const settingsTheme = $('#settings-theme');
const settingsSpeed = $('#settings-speed');
const settingsAiName = $('#settings-ai-name');
const headerTitle = $('.header-info h1');

// ===== HELPERS =====
function saveState() {
  localStorage.setItem('flowchat_chats', JSON.stringify(STATE.chats));
  localStorage.setItem('flowchat_active', STATE.activeChatId);
  localStorage.setItem('flowchat_theme', STATE.theme);
  localStorage.setItem('flowchat_ai_name', STATE.aiName);
  localStorage.setItem('flowchat_speed', STATE.speed);
}

function getActiveChat() {
  return STATE.chats.find(c => c.id === STATE.activeChatId);
}

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

function timeNow() {
  return new Date().toISOString();
}

function formatTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

// ===== THEME =====
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  STATE.theme = theme;
  const icon = themeToggle.querySelector('i');
  if (theme === 'dark') {
    icon.setAttribute('data-lucide', 'moon');
  } else {
    icon.setAttribute('data-lucide', 'sun');
  }
  lucide.createIcons();
  saveState();
}

themeToggle.addEventListener('click', () => {
  const next = STATE.theme === 'light' ? 'dark' : 'light';
  applyTheme(next);
});

// ===== CHAT MANAGEMENT =====
function createChat(title = 'New chat') {
  const chat = {
    id: generateId(),
    title: title,
    messages: [],
    created: timeNow(),
  };
  STATE.chats.unshift(chat);
  STATE.activeChatId = chat.id;
  saveState();
  renderHistory();
  renderMessages();
  updateHeader();
  return chat;
}

function switchChat(id) {
  STATE.activeChatId = id;
  saveState();
  renderHistory();
  renderMessages();
  updateHeader();
  // close sidebar on mobile
  sidebar.classList.remove('open');
}

function deleteChat(id) {
  STATE.chats = STATE.chats.filter(c => c.id !== id);
  if (STATE.activeChatId === id) {
    STATE.activeChatId = STATE.chats.length > 0 ? STATE.chats[0].id : null;
    if (!STATE.activeChatId) createChat();
  }
  saveState();
  renderHistory();
  renderMessages();
  updateHeader();
}

function clearAllChats() {
  if (!confirm('Delete all conversations?')) return;
  STATE.chats = [];
  createChat();
  saveState();
  renderHistory();
  renderMessages();
  updateHeader();
}

newChatBtn.addEventListener('click', () => {
  createChat();
});

clearHistoryBtn.addEventListener('click', clearAllChats);

// ===== MESSAGES =====
function addMessage(role, content) {
  const chat = getActiveChat();
  if (!chat) return;
  const msg = {
    id: generateId(),
    role,
    content,
    time: timeNow(),
  };
  chat.messages.push(msg);
  // update title from first user message
  if (chat.title === 'New chat' && role === 'user') {
    chat.title = content.slice(0, 40) + (content.length > 40 ? '…' : '');
  }
  saveState();
  renderMessages();
  renderHistory();
}

function renderMessages() {
  const chat = getActiveChat();
  messagesEl.innerHTML = '';
  if (!chat || chat.messages.length === 0) {
    messagesEl.innerHTML = `
      <div class="empty-state" style="text-align:center;margin-top:60px;color:var(--text-secondary);">
        <i data-lucide="message-circle" style="width:48px;height:48px;opacity:0.3;margin-bottom:12px;"></i>
        <p style="font-size:15px;">Start a conversation</p>
        <p style="font-size:13px;margin-top:4px;">Type something below</p>
      </div>
    `;
    lucide.createIcons();
    return;
  }
  chat.messages.forEach(msg => {
    const div = document.createElement('div');
    div.className = `message ${msg.role}`;
    div.innerHTML = `
      <div class="message-avatar">${msg.role === 'user' ? 'U' : STATE.aiName[0]}</div>
      <div>
        <div class="message-bubble">${escapeHtml(msg.content)}</div>
        <div class="message-time">${formatTime(msg.time)}</div>
      </div>
    `;
    messagesEl.appendChild(div);
  });
  lucide.createIcons();
  scrollToBottom();
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  });
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

// ===== HISTORY =====
function renderHistory() {
  historyList.innerHTML = '';
  STATE.chats.forEach(chat => {
    const div = document.createElement('div');
    div.className = 'history-item' + (chat.id === STATE.activeChatId ? ' active' : '');
    const label = chat.title === 'New chat' ? 'Empty chat' : chat.title;
    div.innerHTML = `<i data-lucide="message-square" style="width:14px;height:14px;flex-shrink:0;"></i><span>${escapeHtml(label)}</span>`;
    div.addEventListener('click', () => switchChat(chat.id));
    // right-click delete
    div.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      if (STATE.chats.length > 1) {
        deleteChat(chat.id);
      }
    });
    historyList.appendChild(div);
  });
  lucide.createIcons();
}

function updateHeader() {
  const chat = getActiveChat();
  headerTitle.textContent = chat ? STATE.aiName : 'Assistant';
}

// ===== AI REPLY =====
function simulateAiReply(userMessage) {
  if (STATE.typing) return;
  STATE.typing = true;
  typingIndicator.classList.remove('hidden');
  scrollToBottom();

  const speedMap = { fast: 400, normal: 900, slow: 1800 };
  const delay = speedMap[STATE.speed] || 900;

  const replies = [
    "That's a great question! Let me think about it.",
    "Here's what I can tell you about that.",
    "Interesting point. Here's my perspective.",
    "I understand what you're asking. Let me break it down.",
    "Thanks for sharing! Here's my response.",
    "That's something I can help with. Here goes:",
    "Let me provide some insight on that.",
    "I appreciate the question. Here's what I know.",
  ];

  const followUps = [
    "In short, it depends on the context and your specific needs.",
    "I hope that gives you a clearer picture.",
    "Let me know if you'd like more details on any part.",
    "Does that answer your question?",
    "Feel free to ask more — I'm happy to help.",
  ];

  const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];

  const reply = `${pick(replies)}

${pick(followUps)}`;

  setTimeout(() => {
    typingIndicator.classList.add('hidden');
    STATE.typing = false;
    addMessage('ai', reply);
  }, delay);
}

// ===== SEND HANDLER =====
chatForm.addEventListener('submit', (e) => {
  e.preventDefault();
  const text = chatInput.value.trim();
  if (!text || STATE.typing) return;

  // ensure active chat exists
  let chat = getActiveChat();
  if (!chat) {
    chat = createChat();
  }

  addMessage('user', text);
  chatInput.value = '';
  chatInput.focus();

  simulateAiReply(text);
});

chatInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    chatForm.dispatchEvent(new Event('submit'));
  }
});

// ===== SIDEBAR TOGGLE =====
menuToggle.addEventListener('click', () => {
  sidebar.classList.toggle('open');
});

// close sidebar when clicking outside on mobile
document.addEventListener('click', (e) => {
  if (window.innerWidth <= 768) {
    if (!sidebar.contains(e.target) && !menuToggle.contains(e.target)) {
      sidebar.classList.remove('open');
    }
  }
});

// ===== SETTINGS =====
settingsBtn.addEventListener('click', () => {
  settingsTheme.value = STATE.theme;
  settingsSpeed.value = STATE.speed;
  settingsAiName.value = STATE.aiName;
  settingsModal.classList.remove('hidden');
});

closeSettings.addEventListener('click', () => {
  settingsModal.classList.add('hidden');
});

settingsModal.addEventListener('click', (e) => {
  if (e.target === settingsModal) {
    settingsModal.classList.add('hidden');
  }
});

saveSettings.addEventListener('click', () => {
  const newTheme = settingsTheme.value;
  const newSpeed = settingsSpeed.value;
  const newName = settingsAiName.value.trim() || 'Assistant';

  if (newTheme !== STATE.theme) applyTheme(newTheme);
  STATE.speed = newSpeed;
  STATE.aiName = newName;

  saveState();
  updateHeader();
  renderMessages();
  settingsModal.classList.add('hidden');
});

// ===== INIT =====
function init() {
  // apply saved theme
  applyTheme(STATE.theme);

  // ensure at least one chat
  if (STATE.chats.length === 0) {
    createChat();
  } else if (!STATE.activeChatId || !getActiveChat()) {
    STATE.activeChatId = STATE.chats[0].id;
    saveState();
  }

  renderHistory();
  renderMessages();
  updateHeader();
  chatInput.focus();

  // lucide icons
  lucide.createIcons();
}

init();

(() => {
  const messages = document.getElementById('messages');
  const history = document.getElementById('history');
  function add(role, text) {
    const d = document.createElement('div');
    d.className = 'bubble ' + (role === 'user' ? 'user' : '');
    d.textContent = text;
    messages.appendChild(d);
    messages.scrollTop = messages.scrollHeight;
  }
  add('bot', 'Hi — I am Xroga Assistant. Live replies use free open AI (Pollinations). Add your own encrypted API key in Xroga → Integrations for faster models.');
  const thread = [];
  document.getElementById('chat-form')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const q = String(fd.get('q') || '').trim();
    if (!q) return;
    add('user', q);
    thread.push({ role: 'user', content: q });
    const li = document.createElement('li');
    li.textContent = q.slice(0, 40);
    history?.appendChild(li);
    e.target.reset();
    add('bot', 'Thinking…');
    const pending = messages.lastElementChild;
    try {
      const reply = await (window.XrogaLiveAi?.chat
        ? window.XrogaLiveAi.chat(thread, { system: 'You are Xroga Assistant, a helpful product assistant.' })
        : Promise.resolve('Live AI client missing — refresh preview.'));
      if (pending) pending.textContent = reply;
      thread.push({ role: 'assistant', content: reply });
    } catch (err) {
      if (pending) pending.textContent = 'Could not reach free AI — check network and retry.';
    }
  });
  document.getElementById('new-chat')?.addEventListener('click', () => {
    messages.innerHTML = '';
    thread.length = 0;
    add('bot', 'New chat started.');
  });
})();</script>
</body>
